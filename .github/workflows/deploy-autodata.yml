name: Deploy AutoData Database

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "AutoData/**"

jobs:
  build-and-deploy:
    # Requires a Windows self-hosted runner with network access
    # to the target SQL Server.
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve SSDT targets path
        shell: powershell
        run: |
          $candidates = @(
            "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Microsoft\VisualStudio\v17.0\SSDT\Microsoft.Data.Tools.Schema.SqlTasks.targets",
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\MSBuild\Microsoft\VisualStudio\v17.0\SSDT\Microsoft.Data.Tools.Schema.SqlTasks.targets",
            "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\SSDT\Microsoft.Data.Tools.Schema.SqlTasks.targets"
          )

          $targetFile = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $targetFile) {
            throw "Microsoft.Data.Tools.Schema.SqlTasks.targets not found. Install SSDT in Visual Studio 2022 Build Tools."
          }

          $targetDir = Split-Path -Path $targetFile -Parent
          "SQLDBExtensionsRefPath=$targetDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved SQLDBExtensionsRefPath: $targetDir"

      - name: Build AutoData dacpac
        env:
          MSBUILD_EXE: C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe
        shell: powershell
        run: |
          & "$env:MSBUILD_EXE" AutoData/AutoData.sqlproj `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:SQLDBExtensionsRefPath="$env:SQLDBExtensionsRefPath" `
            /p:OutDir="${{ github.workspace }}\AutoData\bin\Release\" `
            /t:Build

      - name: Install or update sqlpackage
        shell: powershell
        run: |
          dotnet tool update --global microsoft.sqlpackage
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global microsoft.sqlpackage
          }

      - name: Publish AutoData to SQL Server
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}  #.\SQLDev3
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }} # AutoData
          SQL_USERNAME: ${{ secrets.SQL_USERNAME }} # sa
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }} # 
          SQLPACKAGE_PATH: ${{ env.USERPROFILE }}\.dotnet\tools\sqlpackage.exe
        run: |
          & "$env:SQLPACKAGE_PATH" `
            /Action:Publish `
            /SourceFile:"AutoData\bin\Release\AutoData.dacpac" `
            /TargetServerName:"$env:SQL_SERVER" `
            /TargetDatabaseName:"$env:SQL_DATABASE" `
            /TargetUser:"$env:SQL_USERNAME" `
            /TargetPassword:"$env:SQL_PASSWORD" `
            /p:BlockOnPossibleDataLoss=true `
            /p:DropObjectsNotInSource=false `
            /p:ExcludeObjectTypes=Logins;Users;RoleMembership
