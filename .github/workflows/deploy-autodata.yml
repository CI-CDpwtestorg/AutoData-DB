name: Deploy AutoData Database

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "AutoData/**"

jobs:
  build-and-deploy:
    # Requires a Windows self-hosted runner with network access
    # to the target SQL Server.
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve MSBuild and SSDT toolchain
        shell: powershell
        run: |
          $selected = $null
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $installPaths = & $vswhere -products * -requires Microsoft.Component.MSBuild -property installationPath
            foreach ($installPath in $installPaths) {
              if ([string]::IsNullOrWhiteSpace($installPath)) { continue }

              $msbuildExe = Join-Path $installPath "MSBuild\Current\Bin\MSBuild.exe"
              $sqlTargets = Join-Path $installPath "MSBuild\Microsoft\VisualStudio\v17.0\SSDT\Microsoft.Data.Tools.Schema.SqlTasks.targets"
              $sqlTaskDll = Join-Path $installPath "Common7\IDE\Extensions\Microsoft\SQLDB\DAC\Microsoft.Data.Tools.Schema.Tasks.Sql.dll"

              if ((Test-Path $msbuildExe) -and (Test-Path $sqlTargets) -and (Test-Path $sqlTaskDll)) {
                $selected = [pscustomobject]@{
                  InstallPath = $installPath
                  MsbuildExe  = $msbuildExe
                  SqlTargets  = $sqlTargets
                }
                break
              }
            }
          }

          if (-not $selected) {
            throw "No compatible Visual Studio instance found with MSBuild + SSDT targets + SQL task DLL. Install SSDT (Microsoft.VisualStudio.Component.SQL.SSDT) in the same VS/Build Tools instance used for MSBuild."
          }

          $targetDir = Split-Path -Path $selected.SqlTargets -Parent
          "MSBUILD_EXE=$($selected.MsbuildExe)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SQLDBExtensionsRefPath=$targetDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved MSBUILD_EXE: $($selected.MsbuildExe)"
          Write-Host "Resolved SQLDBExtensionsRefPath: $targetDir"

      - name: Build AutoData dacpac
        shell: powershell
        run: |
          & "$env:MSBUILD_EXE" AutoData/AutoData.sqlproj `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:SQLDBExtensionsRefPath="$env:SQLDBExtensionsRefPath" `
            /p:OutDir="${{ github.workspace }}\AutoData\bin\Release\" `
            /t:Build

      - name: Install or update sqlpackage
        shell: powershell
        run: |
          $toolPath = Join-Path $env:RUNNER_TEMP "dotnet-tools"
          New-Item -ItemType Directory -Force -Path $toolPath | Out-Null

          dotnet tool update microsoft.sqlpackage --tool-path $toolPath
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install microsoft.sqlpackage --tool-path $toolPath
          }

          $sqlpackageExe = Join-Path $toolPath "sqlpackage.exe"
          if (-not (Test-Path $sqlpackageExe)) {
            throw "sqlpackage.exe not found at $sqlpackageExe after install."
          }

          "SQLPACKAGE_PATH=$sqlpackageExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved SQLPACKAGE_PATH: $sqlpackageExe"

      - name: Publish AutoData to SQL Server
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}  #.\SQLDev3
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }} # AutoData
          SQL_USERNAME: ${{ secrets.SQL_USERNAME }} # sa
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }} # 
          SQL_TRUST_SERVER_CERT: "True"
        run: |
          & "$env:SQLPACKAGE_PATH" `
            /Action:Publish `
            /SourceFile:"AutoData\bin\Release\AutoData.dacpac" `
            /TargetServerName:"$env:SQL_SERVER" `
            /TargetDatabaseName:"$env:SQL_DATABASE" `
            /TargetUser:"$env:SQL_USERNAME" `
            /TargetPassword:"$env:SQL_PASSWORD" `
            /TargetTrustServerCertificate:"$env:SQL_TRUST_SERVER_CERT" `
            /p:CreateNewDatabase=true `
            /p:BlockOnPossibleDataLoss=true `
            /p:DropObjectsNotInSource=false `
            /p:TreatVerificationErrorsAsWarnings=true `
            "/p:ExcludeObjectTypes=Logins;Users;RoleMembership"
